services:
  hugo-chemie-lernen-org:
    image: nginx:alpine
    container_name: hugo-chemie-lernen-org
    restart: unless-stopped
    networks:
      - traefik-web
    volumes:
      - ./myhugoapp/public:/usr/share/nginx/html:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.chemie-http.entrypoints=web"
      - "traefik.http.routers.chemie-http.rule=Host(`chemie-lernen.org`) || Host(`www.chemie-lernen.org`)"
      - "traefik.http.routers.chemie-http.middlewares=chemie-https@file"
      - "traefik.http.routers.chemie.entrypoints=websecure"
      - "traefik.http.routers.chemie.rule=Host(`chemie-lernen.org`) || Host(`www.chemie-lernen.org`)"
      - "traefik.http.routers.chemie.tls=true"
      - "traefik.http.routers.chemie.tls.certresolver=mytlschallenge"
      - "traefik.http.services.chemie.loadbalancer.server.port=80"

networks:
  traefik-web:
    external: true
