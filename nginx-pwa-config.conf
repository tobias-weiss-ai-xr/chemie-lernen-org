# Nginx configuration for chemie-lernen.org with PWA support
# Place this in /etc/nginx/sites-available/chemie-lernen.org

server {
    listen 80;
    server_name chemie-lernen.org www.chemie-lernen.org;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name chemie-lernen.org www.chemie-lernen.org;

    # SSL Configuration (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/chemie-lernen.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chemie-lernen.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;

    # Root directory for Hugo generated files
    root /opt/git/hugo-chemie-lernen-org/public;
    index index.html;

    # MIME Types for PWA
    include /etc/nginx/mime.types;
    types {
        application/manifest+json  webmanifest;
        application/json         json;
        application/wasm          wasm;
        image/webp               webp;
        image/avif               avif;
    }

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' https: data: blob: 'unsafe-inline'" always;

    # PWA Specific Headers
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    add_header Service-Worker-Allowed "/" always;

    # Main site serving with try_files for SPA-like behavior
    location / {
        try_files $uri $uri/ /index.html;
        
        # Don't cache HTML files
        location ~* \.html$ {
            add_header Cache-Control "public, max-age=0, must-revalidate";
        }
    }

    # Static assets with aggressive caching
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|webp|avif|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary Accept-Encoding;
        
        # Enable gzip compression
        gzip_static on;
    }

    # PWA specific files
    location ~* \.(webmanifest|manifest\.json)$ {
        add_header Content-Type "application/manifest+json";
        add_header Cache-Control "public, max-age=0, must-revalidate";
        add_header Access-Control-Allow-Origin "*";
    }

    # Service Worker
    location = /sw.js {
        add_header Content-Type "application/javascript";
        add_header Cache-Control "public, max-age=0, must-revalidate";
        add_header Service-Worker-Allowed "/";
    }

    # API endpoints (if any)
    location /api/ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        
        try_files $uri $uri/ =404;
    }

    # Block access to sensitive files
    location ~ /\. {
        deny all;
    }

    location ~ ~$ {
        deny all;
    }

    # Custom error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    
    location = /404.html {
        root /opt/git/hugo-chemie-lernen-org/public;
        internal;
    }
    
    location = /50x.html {
        root /opt/git/hugo-chemie-lernen-org/public;
        internal;
    }

    # Logging
    access_log /var/log/nginx/chemie-lernen-access.log;
    error_log /var/log/nginx/chemie-lernen-error.log;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        application/atom+xml
        application/geo+json
        application/javascript
        application/x-javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rss+xml
        application/vnd.ms-fontobject
        application/wasm
        application/x-font-ttf
        application/x-web-app-manifest+json
        application/xhtml+xml
        application/xml
        font/opentype
        image/bmp
        image/svg+xml
        image/x-icon
        text/cache-manifest
        text/css
        text/plain
        text/vcard
        text/vnd.rim.location.xloc
        text/vtt
        text/x-component
        text/x-cross-domain-policy;

    # Brotli compression (if available)
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # HTTP/2 Server Push for critical resources
    location = / {
        http2_push /css/custom.css;
        http2_push /css/green-theme.css;
        http2_push /js/dark-mode.js;
        http2_push /favicons/android-chrome-192x192.png;
    }
}