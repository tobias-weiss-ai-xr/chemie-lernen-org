name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 6 * * 1'

concurrency:
  group: playwright-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Playwright E2E (${{ matrix.project }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.project }}

      - name: Run Playwright tests
        run: npx playwright test --project=${{ matrix.project }}
        env:
          CI: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-results-${{ matrix.project }}
          path: tests/test-results/
          retention-days: 30

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.project }}
          path: tests/playwright-report/
          retention-days: 30

  mobile:
    name: Playwright Mobile
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [Mobile Chrome, Mobile Safari]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Run mobile Playwright tests
        run: npx playwright test --project="${{ matrix.project }}"
        env:
          CI: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-results-${{ matrix.project }}
          path: tests/test-results/
          retention-days: 14

  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    if: always()
    needs: [playwright, mobile]
    steps:
      - name: Check results
        run: |
          echo "Desktop tests: ${{ needs.playwright.result }}"
          echo "Mobile tests: ${{ needs.mobile.result }}"
          if [[ "${{ needs.playwright.result }}" == "failure" ]] || [[ "${{ needs.mobile.result }}" == "failure" ]]; then
            echo "::error::Some Playwright tests failed"
            exit 1
          fi
