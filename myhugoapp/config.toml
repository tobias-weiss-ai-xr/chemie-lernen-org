baseURL = "https://chemie-lernen.org/"
defaultContentLanguage = "de"
defaultContentLanguageInSubdir = false
theme = "hugo-cards"

# Disable LiveReload in production
disableLiveReload = true
enableRobotsTXT = true

[languages]
[languages.de]
    languageCode = "de-de"
    languageName = "Deutsch"
    weight = 1
    title = "chemie-lernen.org - Offene, Interaktive und Immersive Lerninhalte"
    contentDir = "content/de"
    [languages.de.params]
        footer_description = "chemie-lernen.org – Kostenlose interaktive Chemie-Lernplattform mit pH-Rechner, Molmasse-Rechner, 3D-Periodensystem (118 Elemente), VR-Element-Räumen, Quiz, Karteikarten und Lernpfaden für Schüler, Studenten und Lehrer."
        search_placeholder = "Themen suchen..."
        skip_to_content = "Zum Hauptinhalt springen"

[languages.en]
    languageCode = "en"
    languageName = "English"
    weight = 2
    title = "learn-chemistry.org - Open, Interactive and Immersive Learning"
    contentDir = "content/en"
    [languages.en.params]
        footer_description = "learn-chemistry.org – Free interactive chemistry learning platform with pH calculator, molar mass calculator, 3D periodic table (118 elements), VR element rooms, quizzes, flashcards and learning paths for students and teachers."
        search_placeholder = "Search topics..."
        skip_to_content = "Skip to main content"

[languages.fr]
    languageCode = "fr"
    languageName = "Français"
    weight = 3
    title = "learn-chemistry.org - Apprentissage Ouvert, Interactif et Immersif"
    contentDir = "content/fr"
    [languages.fr.params]
        footer_description = "learn-chemistry.org – Plateforme gratuite d'apprentissage interactif de la chimie avec calculateur de pH, calculateur de masse molaire, tableau périodique 3D (118 éléments), salles VR, quiz, flashcards et parcours d'apprentissage."
        search_placeholder = "Rechercher des sujets..."
        skip_to_content = "Aller au contenu principal"

[languages.zh]
    languageCode = "zh"
    languageName = "中文"
    weight = 4
    title = "learn-chemistry.org - 开放、互动、沉浸式学习"
    contentDir = "content/zh"
    [languages.zh.params]
        footer_description = "learn-chemistry.org – 免费互动化学学习平台，配备pH计算器、摩尔质量计算器、3D元素周期表（118个元素）、VR元素室、测验、抽认卡和学习路径。"
        search_placeholder = "搜索主题..."
        skip_to_content = "跳转到主要内容"

[languages.sv]
    languageCode = "sv"
    languageName = "Svenska"
    weight = 5
    title = "learn-chemistry.org - Öppen, Interaktiv och Immersiv Inlärning"
    contentDir = "content/sv"
    [languages.sv.params]
        footer_description = "learn-chemistry.org – Gratis interaktiv plattform för kemilärning med pH-kalkylator, molmasskalkylator, 3D-periodiska systemet (118 element), VR-elementrum, quiz, flashcards och inlärningsvägar."
        search_placeholder = "Sök ämnen..."
        skip_to_content = "Hoppa till huvudinnehållet"

[sitemap]
  changefreq = "weekly"
  priority = 0.8
  filename = "sitemap.xml"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [['\[', '\]'], ['$$', '$$']]
          inline = [['\(', '\)'], ['$', '$']]

[params]
  github = "tobias-weiss-ai-xr"
  custom_css = ["css/custom.css", "css/dark-mode.css", "css/pse-in-vr.css"]
  custom_js = ["js/dark-mode.js"]
  defaultImage = "img/chemie-lernen-banner.png"
  footer_description = "chemie-lernen.org – Kostenlose interaktive Chemie-Lernplattform mit pH-Rechner, Molmasse-Rechner, 3D-Periodensystem (118 Elemente), VR-Element-Räumen, Quiz, Karteikarten und Lernpfaden für Schüler, Studenten und Lehrer. Säuren-Basen, Stöchiometrie, Redox, organische Chemie und mehr."

[params.meta]
  keywords = "chemie-lernen.org, VR Chemieunterricht, Virtual Reality Bildung, Chemie lernen online, interaktiver Chemieunterricht, digitale Bildung, VR Lernräume, Chemie studieren, innovative Chemie, immersive Bildung"

author = "chemie-lernen.org Team"

# Search Index Configuration
[outputs]
  home = ["HTML", "RSS", "JSON"]
  page = ["HTML"]
  section = ["HTML", "RSS"]

[outputFormats]
  [outputFormats.JSON]
    mediaType = "application/json"
    baseName = "index"
    isPlainText = true
    notAlternative = true

[mediaTypes]
  [mediaTypes."application/json"]
    suffixes = ["json"]

