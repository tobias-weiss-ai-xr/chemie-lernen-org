baseURL = "https://chemie-lernen.org/"
languageCode = "de-de"
title = "chemie-lernen.org - 📖 Offene, 🖱️ Interaktive und 🥽 Immersive Lerninhalte"
theme = "hugo-cards"

# Disable LiveReload in production
disableLiveReload = true
enableRobotsTXT = true

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [['\[', '\]'], ['$$', '$$']]
          inline = [['\(', '\)'], ['$', '$']]

[params]
  github = "tobias-weiss-ai-xr"
  custom_css = ["css/custom.css", "css/dark-mode.css", "css/pse-in-vr.css"]
  custom_js = ["js/dark-mode.js"]
  defaultImage = "img/chemie-lernen-banner.png"
  footer_description = "chemie-lernen.org - Ihre Plattform für innovative Chemie-Lernräume in Virtual Reality. Erleben Sie das Periodensystem in VR mit 118 einzigartigen Element-Räumen."

[params.meta]
  keywords = "chemie-lernen.org, VR Chemieunterricht, Virtual Reality Bildung, Chemie lernen online, interaktiver Chemieunterricht, digitale Bildung, VR Lernräume, Chemie studieren, innovative Chemie, immersive Bildung"

author = "chemie-lernen.org Team"

# Search Index Configuration
[outputs]
  home = ["HTML", "RSS", "JSON"]
  page = ["HTML"]
  section = ["HTML", "RSS"]

[outputFormats]
  [outputFormats.JSON]
    mediaType = "application/json"
    baseName = "index"
    isPlainText = true
    notAlternative = true

[mediaTypes]
  [mediaTypes."application/json"]
    suffixes = ["json"]

