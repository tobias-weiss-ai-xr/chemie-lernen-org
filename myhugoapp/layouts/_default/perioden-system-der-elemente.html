{{ define "title" }}Periodensystem der Elemente{{ end }}

{{ define "css" }}
<link rel="stylesheet" href="{{ "/css/perioden-system-der-elemente.css" | relURL }}">
{{ end }}

{{ define "main" }}
<h1 class="sr-only">Periodensystem der Elemente - Interaktive 3D-Visualisierung</h1>
<div id="menu">
    <button id="table" aria-label="Tabellenansicht anzeigen">TABELLE</button>
    <button id="sphere" aria-label="Kugelansicht anzeigen">KUGEL</button>
    <button id="helix" aria-label="Helixansicht anzeigen">HELIX</button>
    <button id="grid" aria-label="Gitteransicht anzeigen">GITTER</button>
</div>
<div id="container" role="region" aria-label="Periodensystem der Elemente Visualisierung"></div>
{{ end }}

{{ define "js" }}
<script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
    }
</script>
<script type="module" src="{{ "/js/perioden-system-der-elemente.js" | relURL }}"></script>
{{ end }}
