<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Favicons -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ "/favicons/apple-touch-icon.png" | relURL }}">
<link rel="icon" type="image/png" sizes="32x32" href="{{ "/favicons/favicon-32x32.png" | relURL }}">
<link rel="icon" type="image/png" sizes="16x16" href="{{ "/favicons/favicon-16x16.png" | relURL }}">
<link rel="manifest" href="{{ "/favicons/site.webmanifest" | relURL }}">
<link rel="mask-icon" href="{{ "/favicons/safari-pinned-tab.svg" | relURL }}" color="#5bbad5">
<meta name="msapplication-TileColor" content="#da532c">
<meta name="msapplication-TileImage" content="{{ "/favicons/mstile-144x144.png" | relURL }}">
<meta name="theme-color" content="#ffffff">

<title>{{ .Title }}{{ if .IsPage }} - {{ .Site.Title }}{{ end }}</title>

<!-- Bootstrap 3 CDN -->
<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">

<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">

{{ $sass := resources.Get "sass/main.scss" }}
{{ if $sass }}
  {{ $main := $sass | toCSS (dict "outputStyle" "compressed") }}
  <link rel="stylesheet" href="{{ $main.RelPermalink }}">
{{ end }}

{{ range .Site.Params.custom_css -}}
    <link rel="stylesheet" href="{{ . | relURL }}">
{{- end }}
