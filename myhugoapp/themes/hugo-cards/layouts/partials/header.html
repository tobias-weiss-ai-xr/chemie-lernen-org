<header class="site-header">
<div class="container-fluid">
  <!-- Title row with logo and theme toggle -->
  <div class="title-row">
    <div class="navbar-brand-wrapper">
      <a class="navbar-brand" href="{{ .Site.BaseURL }}">
        <img src="{{ "/img/chemie-lernen-logo_light.png" | relURL }}" alt="{{ .Site.Title }}" height="120" class="d-inline-block align-top site-logo">
        {{ .Site.Title }}
      </a>
      <!-- Dark mode toggle next to title -->
      <a href="#" id="theme-toggle" title="Zu dunkel wechseln" class="theme-toggle-header">
        <i class="fa fa-moon-o"></i>
      </a>
    </div>
  </div>

  <!-- Navigation row with menu -->
  <nav class="navbar navbar-default">
    <div class="container-fluid">
      <!-- Brand and toggle get grouped for better mobile display -->
      <div class="navbar-header">
        <button type="button" class="navbar-toggle" data-toggle="collapse" data-target="#bs-example-navbar-collapse-1" aria-expanded="true">
          <span class="sr-only">Toggle navigation</span>
          <span class="icon-bar"></span>
          <span class="icon-bar"></span>
          <span class="icon-bar"></span>
        </button>
      </div>

      <!-- Collect the nav links, forms, and other content for toggling -->
      <div class="collapse navbar-collapse in" id="bs-example-navbar-collapse-1">
              <ul class="nav navbar-nav">
          {{ range .Site.Menus.main }}
            <li><a href="{{ .URL }}">{{ .Name }}</a></li>
          {{ end }}
        </ul>
      </div><!-- /.navbar-collapse -->
    </div><!-- /.container-fluid -->
  </nav>
</div>
</header>
